name: test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  unit:
    name: unit tests (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.1", "3.2", "3.3"]
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run unit tests (no `claude` CLI installed here)
        env:
          SKIP_INTEGRATION: "1"
        run: bin/test

  integration:
    name: integration tests (with real Claude CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Run full suite against mock Anthropic API
        run: bin/test
